<style>
  /* === TOUT TON CSS EXISTANT === */
  /* Garde tout le CSS que tu as déjà, il reste identique */
  :root[data-theme="dark"] {
    --bg:#100e09;--bg2:#1a1610;--bg3:#221e15;--card:#1e1a12;--card2:#252015;
    --border:#2e2820;--text:#e8dfc8;--text2:#9a8f78;--text3:#5c5444;
    --gold:#c9a84c;--gold2:#e8c96e;--accent:#d4472a;--accent2:#e05a3a;
    --green:#4caf7d;--purple:#9b59b6;--blue:#3d8bcd;
    --nav-bg:#c9a84c;--nav-text:#100e09;
  }
  :root[data-theme="light"] {
    --bg:#f5f0e8;--bg2:#ede6d6;--bg3:#e4dac6;--card:#ffffff;--card2:#f8f3e8;
    --border:#d4c9b0;--text:#1a1610;--text2:#5c5444;--text3:#9a8f78;
    --gold:#b8922e;--gold2:#d4a83e;--accent:#c43520;--accent2:#d4462e;
    --green:#2e8a5c;--purple:#7d3ea0;--blue:#2a6fa0;
    --nav-bg:#c9a84c;--nav-text:#ffffff;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;display:flex;flex-direction:column;}

  .main-content{flex:1;}

  nav{background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
  .nav-inner{max-width:1400px;margin:0 auto;padding:0 24px;display:flex;align-items:center;gap:16px;height:70px;}
  .logo-svg-wrap{display:flex;align-items:center;flex-shrink:0;cursor:default;}
  .logo-svg-wrap img{height:55px;width:auto;display:block;}
  .logo-img { display: block; }
  .nav-links{display:flex;align-items:center;gap:4px;margin-left:auto;}
  .nav-btn{background:none;border:none;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;padding:6px 14px;border-radius:20px;display:flex;align-items:center;gap:6px;transition:all .2s;white-space:nowrap;}
  .nav-btn:hover{color:var(--text);background:var(--bg3);}
  .nav-btn.active{background:var(--nav-bg);color:var(--nav-text);font-weight:600;}
  .nav-right{display:flex;align-items:center;gap:8px;margin-left:8px;}
  .icon-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);cursor:pointer;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s;}
  .icon-btn:hover{color:var(--gold);border-color:var(--gold);}
  .admin-btn.logged{border-color:var(--green);color:var(--green);}
  .admin-dot{position:absolute;top:-2px;right:-2px;width:8px;height:8px;border-radius:50%;background:var(--green);display:none;}
  .admin-btn{position:relative;}
  .admin-btn.logged .admin-dot{display:block;}

  .admin-bar{background:rgba(76,175,125,.1);border-bottom:1px solid rgba(76,175,125,.3);padding:6px 24px;display:none;align-items:center;gap:12px;font-size:12px;color:var(--green);}
  body.admin-mode .admin-bar{display:flex;}

  .settings-panel{position:fixed;top:70px;right:-380px;width:380px;height:calc(100% - 70px);background:var(--bg2);border-left:1px solid var(--border);z-index:150;transition:right .3s ease;display:flex;flex-direction:column;box-shadow:-4px 0 20px rgba(0,0,0,.3);}
  .settings-panel.open{right:0;}
  .settings-header{display:flex;justify-content:space-between;align-items:center;padding:20px 24px;border-bottom:1px solid var(--border);font-family:'Syne',sans-serif;font-weight:700;font-size:18px;}
  .settings-close{background:none;border:none;font-size:24px;cursor:pointer;color:var(--text2);}
  .settings-content{padding:24px;flex:1;overflow-y:auto;}
  .settings-section{margin-bottom:24px;}
  .settings-label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin-bottom:12px;display:block;}
  .page-selector{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
  .page-selector button{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;}
  .page-selector button.active{background:var(--gold);color:var(--bg);border-color:var(--gold);}
  .badges-list{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;margin-top:12px;}
  .badge-color-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);}
  .badge-color-item:last-child{border-bottom:none;}
  .badge-name{font-size:13px;font-weight:500;}
  .color-preview{width:24px;height:24px;border-radius:4px;margin-right:8px;border:1px solid var(--border);}
  .color-input{width:80px;border:1px solid var(--border);border-radius:4px;padding:4px;background:var(--bg);color:var(--text);font-size:12px;}
  .badge-example{padding:4px 8px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-left:8px;}
  .edit-cat-btn{background:var(--gold);color:var(--bg);border:none;border-radius:4px;padding:2px 6px;font-size:10px;cursor:pointer;margin-left:4px;}
  .delete-cat-btn{background:var(--accent);color:#fff;border:none;border-radius:4px;padding:2px 6px;font-size:10px;cursor:pointer;margin-left:4px;}

  .page{display:none;max-width:1400px;margin:0 auto;padding:32px 24px 80px;}
  .page.active{display:block;}
  .page-header{margin-bottom:28px;}
  .page-title{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;display:flex;align-items:center;gap:10px;margin-bottom:6px;}
  .page-sub{color:var(--text2);font-size:14px;}

  .filter-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px;align-items:center;}
  .filter-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;padding:6px 16px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px;transition:all .2s;}
  .filter-btn:hover{color:var(--text);border-color:var(--text3);}
  .filter-btn.active{background:var(--gold);color:var(--bg);border-color:var(--gold);font-weight:700;}
  .add-cat-btn{background:none;border:1px dashed var(--border);color:var(--text3);cursor:pointer;font-size:12px;padding:6px 14px;border-radius:20px;transition:all .2s;display:none;align-items:center;gap:4px;}
  .add-cat-btn:hover{color:var(--gold);border-color:var(--gold);}
  body.admin-mode .add-cat-btn{display:flex;}

  .video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
  .video-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:transform .2s,border-color .2s;position:relative;}
  .video-card:hover{transform:translateY(-3px);border-color:var(--gold);}
  body.admin-mode .video-card{cursor:grab;}
  body.admin-mode .video-card:active{cursor:grabbing;}
  .video-card.dragging{opacity:.4;border:2px dashed var(--gold);}
  .video-card.drag-over{border:2px solid var(--gold2);background:rgba(201,168,76,.08);}
  .video-thumb{width:100%;aspect-ratio:16/10;background:var(--bg3);position:relative;overflow:hidden;}
  .video-thumb video{width:100%;height:100%;object-fit:cover;}
  .video-thumb img{width:100%;height:100%;object-fit:cover;}
  .video-thumb-placeholder{width:100%;height:100%;background:linear-gradient(135deg,var(--bg3) 0%,var(--card2) 100%);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:var(--text3);}
  .play-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.35);opacity:0;transition:opacity .2s;cursor:pointer;z-index:2;}
  .video-card:hover .play-overlay{opacity:1;}
  .play-circle{width:52px;height:52px;background:rgba(255,255,255,.9);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;}
  .video-badge{position:absolute;top:10px;left:10px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px;z-index:3;}
  .video-stats{display:flex;align-items:center;gap:12px;padding:8px 12px 0;border-top:1px solid var(--border);margin-top:8px;}
  .stat-item{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text3);}
  .like-btn{background:none;border:none;cursor:pointer;font-size:16px;line-height:1;transition:transform .15s;padding:0;}
  .like-btn:hover{transform:scale(1.3);}
  .like-btn.liked{animation:heartPop .25s ease;}
  @keyframes heartPop{0%{transform:scale(1);}50%{transform:scale(1.5);}100%{transform:scale(1);}}
  .view-icon{font-size:13px;}
  .video-info{padding:10px 12px 12px;}
  .video-info-title{font-size:13px;font-weight:600;margin-bottom:4px;color:var(--text);}
  .video-info-sub{font-size:12px;color:var(--text2);}
  .card-admin-actions{position:absolute;top:8px;right:8px;display:none;gap:4px;z-index:10;}
  body.admin-mode .card-admin-actions{display:flex;}
  .action-btn{background:rgba(16,14,9,.8);border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer;transition:all .2s;white-space:nowrap;}
  .action-btn:hover{background:var(--gold);color:var(--bg);border-color:var(--gold);}
  .action-btn.del:hover{background:var(--accent);border-color:var(--accent);color:#fff;}
  body.admin-mode .video-card::before{content:'⠿';position:absolute;bottom:8px;right:8px;color:var(--text3);font-size:14px;z-index:4;pointer-events:none;}
  .sec-admin{display:none;justify-content:flex-end;margin-bottom:16px;gap:8px;}
  body.admin-mode .sec-admin{display:flex;}
  .sec-btn{background:var(--gold);color:var(--bg);border:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;padding:8px 18px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:opacity .2s;}
  .sec-btn:hover{opacity:.85;}
  .sec-btn-hint{background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-family:'DM Sans',sans-serif;font-size:12px;padding:8px 14px;border-radius:8px;display:flex;align-items:center;gap:6px;}

  /* === Le reste du CSS (storytelling, emploi, concepts, dropbox, radar) === */

</style>
</head>

<script>
// ==================== CONFIGURATION FIREBASE ====================
// Ces valeurs sont dans firebase-config.js
// Le script va attendre que Firebase soit chargé

let db, auth;
let isFirebaseReady = false;
let pendingActions = [];

function initFirebaseApp() {
  if(typeof firebase !== 'undefined' && firebase.apps.length > 0) {
    db = firebase.firestore();
    auth = firebase.auth();
    isFirebaseReady = true;
    // Exécuter les actions en attente
    pendingActions.forEach(action => action());
    pendingActions = [];
    console.log("✅ Firebase prêt !");
  } else {
    setTimeout(initFirebaseApp, 100);
  }
}

// Attendre que firebase-config.js soit chargé
setTimeout(initFirebaseApp, 500);

// ==================== VARIABLES GLOBALES ====================
let isAdmin = false;
const ADMIN_PASS = "21032001";
let editingId = null;
let pendingCatCtx = '';
let editingCatInfo = null;
let currentStars = 3;
let badgeColors = {};
let currentMediaType = 'video';
let currentUserId = null;

// Données

let instantFilter = 'tout';

let storiesFilter = 'tout';

  {id:'hype', label:'HYPE', color:'#d4472a'},

  {id:'business', label:'BUSINESS', color:'#4caf7d'},
  {id:'danger', label:'DANGER', color:'#e05a3a'}
];
let dropMessages = [];

// ==================== AUTHENTIFICATION FIREBASE ====================
function waitForFirebase(callback) {
  if(isFirebaseReady) {
    callback();
  } else {
    pendingActions.push(callback);
  }
}

auth.onAuthStateChanged(async (user) => {
  waitForFirebase(async () => {
    if (user) {
      currentUserId = user.uid;
      console.log("✅ Utilisateur connecté:", currentUserId);
      await loadAllData();
    } else {
      try {
        const result = await auth.signInAnonymously();
        currentUserId = result.user.uid;
        console.log("✅ Nouvel utilisateur anonyme:", currentUserId);
        await loadAllData();
      } catch (error) {
        console.error("❌ Erreur connexion:", error);
        loadLocalData();
        renderAll();
      }
    }
  });
});

// ==================== CHARGEMENT DES DONNÉES FIREBASE ====================
async function loadAllData() {
  await Promise.all([
    loadVideos(),
    loadStories(),
    loadEmplois(),
    loadConcepts(),
    loadRadar(),
    loadMailbox(),
    loadDropMessages(),
    loadBadgeColors(),
    loadCategories()
  ]);
  renderAll();
}

async function loadVideos() {
  const snapshot = await db.collection('videos').get();
  if (!snapshot.empty) {
    videos = [];
    snapshot.forEach(doc => {
      videos.push({ id: parseInt(doc.id), ...doc.data() });
    });
    videos.sort((a,b) => a.id - b.id);
  } else {
    // Données par défaut
    videos = [
      {id:1,title:"Un monde de chien pour l'ouverture de la boutique",desc:"Notre reporter sur place",cat:"60s",src:null,mediaType:'video',views:142,likes:38},
      {id:2,title:"Braquage au Fleeca Bank : 60 secondes chrono",desc:"Résumé ultra-rapide",cat:"60s",src:null,mediaType:'video',views:89,likes:21},
      {id:3,title:"C'est quoi ton salaire à LS ?",desc:"On a posé la question qui fâche...",cat:"micro",src:null,mediaType:'video',views:211,likes:54},
      {id:4,title:"Lil Smokey — Interview Colors",desc:"Le rappeur de Strawberry se confie...",cat:"colors",src:null,mediaType:'video',views:75,likes:19},
      {id:5,title:"Course-poursuite sur l'autoroute",desc:"La LSPD en action ce matin à 6h",cat:"60s",src:null,mediaType:'video',views:304,likes:67},
    ];
    for (const v of videos) {
      await db.collection('videos').doc(v.id.toString()).set(v);
    }
  }
}

async function loadRadar() {
  const snapshot = await db.collection('radar_spots').get();

// ==================== FONCTIONS DE LIKE (GLOBAUX) ====================
async function toggleLike(id) {
  const video = videos.find(v=>v.id===id);
  if(!video) return;
  const likeRef = db.collection('likes').doc(`${id}_${currentUserId}`);
  const likeDoc = await likeRef.get();
  if(likeDoc.exists) {
    await likeRef.delete();
    video.likes--;
  } else {
    await likeRef.set({ postId: id, userId: currentUserId, timestamp: Date.now() });
    video.likes++;
  }
  await db.collection('videos').doc(id.toString()).update({ likes: video.likes });
  const likeSpan = document.getElementById(`like-count-${id}`);
  if(likeSpan) likeSpan.textContent = video.likes;
  const likeBtn = document.querySelector(`.video-card[data-id="${id}"] .like-btn`);
  if(likeBtn) {
    if(!likeDoc.exists) {
      likeBtn.classList.add('liked');
      likeBtn.innerHTML = '❤️';
    } else {
      likeBtn.classList.remove('liked');
      likeBtn.innerHTML = '🤍';
    }
  }
}

async function checkUserLike(id) {
  const likeRef = db.collection('likes').doc(`${id}_${currentUserId}`);
  const likeDoc = await likeRef.get();
  return likeDoc.exists;
}

function escapeHtml(str){if(!str)return '';return str.replace(/[&<>]/g,function(m){if(m==='&')return '&amp;';if(m==='<')return '&lt;';if(m==='>')return '&gt;';return m;});}

    bar.innerHTML+=`<button class="filter-btn${currentFilter===id?' active':''}" onclick="${filterFn}('${id}',this)">${lbl}</button>`;

async function playMedia(id){
  const v=videos.find(x=>x.id===id);if(!v)return;
  v.views++;
  await db.collection('videos').doc(id.toString()).update({ views: v.views });
  const viewSpan = document.getElementById(`view-count-${id}`);
  if(viewSpan) viewSpan.textContent = formatNum(v.views);
  if(!v.src){showToast('ℹ️ Aucun média uploadé pour ce post.');return;}
  document.getElementById('vplayer-title').textContent=v.title;
  const container = document.getElementById('vplayer-container');
  if(v.mediaType === 'image') {
    container.innerHTML = `<img src="${v.src}" style="width:100%;max-height:70vh;object-fit:contain;background:#000;">`;
  } else {
    container.innerHTML = `<video id="vplayer-el" src="${v.src}" controls style="width:100%;max-height:70vh;"></video>`;
  }
  document.getElementById('vplayer-overlay').classList.add('open');
}

function closeVPlayer(e){
  if(e&&e.target!==document.getElementById('vplayer-overlay'))return;
  const video = document.getElementById('vplayer-el');
  if(video) video.pause();
  document.getElementById('vplayer-overlay').classList.remove('open');
}

function setMediaType(type) {
  currentMediaType = type;
  document.querySelectorAll('.media-type-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.type === type);
  });
  const uploadZone = document.querySelector('#video-upload-group .upload-zone');
  if(uploadZone) {
    if(type === 'video') {
      uploadZone.innerHTML = '📹 Uploader une vidéo<input type="file" id="vm-file" accept="video/*" onchange="handleMediaFile(event)">';
    } else {
      uploadZone.innerHTML = '🖼️ Uploader une image<input type="file" id="vm-file" accept="image/*" onchange="handleMediaFile(event)">';
    }
  }
}

function handleMediaFile(e){
  const f=e.target.files[0];if(!f)return;
  const reader = new FileReader();
  reader.onload = function(event) {
    const url = event.target.result;
    e.target.dataset.url = url;
    const p=document.getElementById('vm-preview');p.style.display='flex';
    if(currentMediaType === 'video') {
      p.innerHTML=`<video src="${url}" style="width:100px;height:60px;border-radius:4px" muted></video><span>${f.name}</span>`;
    } else {
      p.innerHTML=`<img src="${url}" style="width:80px;height:60px;border-radius:4px;object-fit:cover;"><span>${f.name}</span>`;
    }
  };
  reader.readAsDataURL(f);
}

function openVideoModal(id=null){
  editingId=id;
  const v=id?videos.find(x=>x.id===id):null;
  document.getElementById('vm-modal-title').textContent=id?'Modifier le post':'Ajouter un post';
  document.getElementById('vm-title').value=v?v.title:'';
  document.getElementById('vm-desc').value=v?v.desc:'';
  document.getElementById('vm-cat').innerHTML=instantCats.map(c=>`<option value="${c.id}"${v&&v.cat===c.id?' selected':''}>${c.label}</option>`).join('');
  document.getElementById('vm-preview').style.display='none';
  document.getElementById('vm-file').value='';delete document.getElementById('vm-file').dataset.url;
  document.getElementById('vm-views').value=v?v.views:0;
  document.getElementById('vm-likes').value=v?v.likes:0;
  if(v && v.mediaType) {
    currentMediaType = v.mediaType;

      uploadZone.innerHTML = '🖼️ Uploader une image<input type="file" id="vm-file" accept="image/*" onchange="handleMediaFile(event)">';

async function saveVideo(){
  const t=document.getElementById('vm-title').value.trim();if(!t){showToast('⚠️ Donne un titre !');return;}
  const fi=document.getElementById('vm-file');
  const src=fi.dataset.url||(editingId?videos.find(v=>v.id===editingId)?.src:null);
  const views = parseInt(document.getElementById('vm-views').value) || 0;
  const likes = parseInt(document.getElementById('vm-likes').value) || 0;
  const d={title:t,desc:document.getElementById('vm-desc').value,cat:document.getElementById('vm-cat').value,src,mediaType:currentMediaType,views:views,likes:likes};
  if(editingId){
    const i=videos.findIndex(v=>v.id===editingId);
    videos[i]={...videos[i],...d};
    await saveVideoToFirebase(videos[i]);
  } else {
    const newId = videos.length > 0 ? Math.max(...videos.map(v=>v.id)) + 1 : 1;
    const newVideo = {id:newId,...d};
    videos.push(newVideo);
    await saveVideoToFirebase(newVideo);
  }
  closeModal('video-modal');renderInstant();showToast(editingId?'✅ Post modifié !':'✅ Post ajouté !');editingId=null;
}
function editVideo(id){openVideoModal(id);}
async function deleteVideo(id){
  if(!confirm('Supprimer ?'))return;
  videos=videos.filter(v=>v.id!==id);
  await deleteVideoFromFirebase(id);
  const likesSnapshot = await db.collection('likes').where('postId', '==', id).get();
  likesSnapshot.forEach(doc => doc.ref.delete());
  renderInstant();showToast('🗑️ Supprimé');
}

function addImageToEditor() {

      const reader = new FileReader();

      reader.readAsDataURL(file);
    }
  };
  input.click();

      <div class="radar-name">${escapeHtml(s.name)} <span class="radar-badge" style="background:${ambiance.color}20;color:${ambiance.color};border-color:${ambiance.color}40;">${ambiance.label}</span></div>

        <div style="display:flex;gap:8px;align-items:center">
          <input type="range" min="1" max="5" value="${s.crowd}" class="crowd-slider" style="flex:1" oninput="updateRadarCrowd(${s.id},this.value)" onchange="updateRadarCrowd(${s.id},this.value)">
          <span class="crowd-value" id="rcval-${s.id}">${s.crowd}</span>
        </div>
        <div style="display:flex;gap:6px;margin-top:8px">
          <button class="action-btn" onclick="editRadar(${s.id})">✏️ Modifier</button>
          <button class="action-btn del" onclick="deleteRadar(${s.id})">🗑️ Supprimer</button>
        </div>
      </div>`:''}
    </div>
    <div class="radar-right">
      <div class="crowd-meter" id="rmeter-${s.id}">${bars}</div>
      <div class="crowd-label">👥 Crowd</div>
    </div>
  </div>`;
}
async function updateRadarCrowd(id,val){
  const s=radarSpots.find(x=>x.id===id);if(!s)return;
  s.crowd=parseInt(val);
  await saveRadarSpotToFirebase(s);
  document.getElementById('rcval-'+id).textContent=val;
  const m=document.getElementById('rmeter-'+id);
  if(m){
    m.querySelectorAll('.crowd-bar').forEach((b,i)=>{
      if(i < s.crowd) {
        b.classList.add('filled');
        if(s.status==='hype') b.classList.add('hype');
      } else {
        b.classList.remove('filled');
        b.classList.remove('hype');
      }
    });
  }
}

  editingId=id;const s=id?radarSpots.find(x=>x.id===id):null;

  const n=document.getElementById('rm-name').value.trim();if(!n){showToast('⚠️ Nom requis');return;}

    const existingSpot = radarSpots.find(s=>s.id===editingId);
    crowdValue = existingSpot ? existingSpot.crowd : 3;
  }
  const d={name:n,loc:document.getElementById('rm-loc').value,desc:document.getElementById('rm-desc').value,status:document.getElementById('rm-status').value,crowd:crowdValue};
  if(editingId){

    await saveRadarSpotToFirebase(radarSpots[i]);
  } else {

        </div>
      </div>
    `;
  }).join('');
}

function openEditCatModal(page, catId) {
  editingCatInfo = { page, catId };
  const currentCat = getCatById(page, catId);
  document.getElementById('editcat-name').value = currentCat.label;
  openModal('editcat-modal');
}

function getCatById(page, catId) {
  if(page === 'instant') return instantCats.find(c => c.id === catId);
  if(page === 'stories') return { id: catId, label: catId };
  if(page === 'emploi') return { id: catId, label: catId };
  if(page === 'concepts') return { id: catId, label: catId };
  return null;
}

async function confirmEditCat() {
  const newName = document.getElementById('editcat-name').value.trim();
  if(!newName) { showToast('⚠️ Nom requis'); return; }
  const { page, catId } = editingCatInfo;
  
  if(page === 'instant') {
    const index = instantCats.findIndex(c => c.id === catId);
    if(index !== -1) {
      instantCats[index].label = newName.toUpperCase();
      await saveCategoriesToFirebase();
      renderInstant();
    }
  } else if(page === 'stories') {
    const index = storyCats.findIndex(c => c === catId);
    if(index !== -1) {
      storyCats[index] = newName.toUpperCase();
      await saveCategoriesToFirebase();
      renderStories();
    }
  } else if(page === 'emploi') {
    const index = emploiCats.findIndex(c => c === catId);
    if(index !== -1) {
      emploiCats[index] = newName.toLowerCase();
      await saveCategoriesToFirebase();
      renderEmploi();
    }
  } else if(page === 'concepts') {
    const index = conceptCats.findIndex(c => c === catId);
    if(index !== -1) {
      conceptCats[index] = newName.toUpperCase();
      await saveCategoriesToFirebase();
      renderConcepts();
    }
  }
  
  closeModal('editcat-modal');
  renderBadgesList();
  showToast(`✅ Catégorie renommée en "${newName}" !`);
  editingCatInfo = null;
}

async function updateBadgeColor(page, catId, color) {
  if(!badgeColors[page]) badgeColors[page] = {};
  badgeColors[page][catId] = color;
  await saveBadgeColorsToFirebase();
  if(page === 'instant') renderInstant();
  else if(page === 'stories') renderStories();
  else if(page === 'emploi') renderEmploi();
  else if(page === 'concepts') renderConcepts();
  renderBadgesList();
  showToast(`🎨 Couleur du badge modifiée !`);
}

async function deleteCategory(page, catId) {
  if(!confirm(`Supprimer la catégorie "${catId}" ? Les posts avec cette catégorie ne seront plus visibles.`)) return;
  if(page === 'instant') {
    instantCats = instantCats.filter(c => c.id !== catId);
    await saveCategoriesToFirebase();
    renderInstant();
  } else if(page === 'stories') {
    storyCats = storyCats.filter(c => c !== catId);
    await saveCategoriesToFirebase();
    renderStories();
  } else if(page === 'emploi') {
    emploiCats = emploiCats.filter(c => c !== catId);
    await saveCategoriesToFirebase();
    renderEmploi();
  } else if(page === 'concepts') {
    conceptCats = conceptCats.filter(c => c !== catId);
    await saveCategoriesToFirebase();
    renderConcepts();
  }
  renderBadgesList();
  showToast(`🗑️ Catégorie supprimée !`);
}

function addCategory(ctx){pendingCatCtx=ctx;document.getElementById('addcat-name').value='';openModal('addcat-modal');}
async function confirmAddCat(){
  const name=document.getElementById('addcat-name').value.trim();if(!name){showToast('⚠️ Nom requis');return;}
  if(pendingCatCtx==='instant'){
    const id=name.toLowerCase().replace(/\s+/g,'-');
    instantCats.push({id,label:name.toUpperCase()});
    await saveCategoriesToFirebase();
    renderInstant();
  } else if(pendingCatCtx==='stories'){
    storyCats.push(name.toUpperCase());
    await saveCategoriesToFirebase();
    renderStories();
  } else if(pendingCatCtx==='emploi'){
    emploiCats.push(name.toLowerCase());
    await saveCategoriesToFirebase();
    renderEmploi();
  } else if(pendingCatCtx==='concepts'){
    conceptCats.push(name.toUpperCase());
    await saveCategoriesToFirebase();
    renderConcepts();
  }
  closeModal('addcat-modal');
  renderBadgesList();
  showToast(`✅ Catégorie "${name}" créée !`);
}

function previewImg(e,previewId){
  const f=e.target.files[0];if(!f)return;
  const reader = new FileReader();
  reader.onload = function(event) {
    const url = event.target.result;
    e.target.dataset.url = url;
    const p=document.getElementById(previewId);p.style.display='flex';
    p.innerHTML=`<img src="${url}"><span>${f.name}</span>`;
  };
  reader.readAsDataURL(f);
}

// ==================== DRAG & DROP ====================
let dragSrcId=null;
let dragType=null;
function dragStart(e,type){
  if(!isAdmin)return;
  dragSrcId=parseInt(e.currentTarget.dataset.id);
  dragType=type;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
}
function dragOver(e){e.preventDefault();e.dataTransfer.dropEffect='move';e.currentTarget.classList.add('drag-over');}
function dragLeave(e){e.currentTarget.classList.remove('drag-over');}
function dragEnd(e){e.currentTarget.classList.remove('dragging');}
function dropItem(e,type){
  e.preventDefault();e.currentTarget.classList.remove('drag-over');
  if(!isAdmin||dragType!==type)return;
  const targetId=parseInt(e.currentTarget.dataset.id);
  if(dragSrcId===targetId)return;
  if(type==='video'){
    const arr=videos;
    const si=arr.findIndex(x=>x.id===dragSrcId);
    const ti=arr.findIndex(x=>x.id===targetId);
    if(si<0||ti<0)return;
    [arr[si],arr[ti]]=[arr[ti],arr[si]];
    for (const v of arr) {
      await saveVideoToFirebase(v);
    }
    renderInstant();
  }
  showToast('✅ Ordre mis à jour !');
}

// ==================== RENDER ALL ====================
function renderAll(){
  renderInstant();
  renderStories();
  renderConcepts();
  renderEmploi();
  renderRadar();
  renderDropMessages();
  renderMails();
}
